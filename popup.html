<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Usage Checker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Codex</p>
        <h1>用量余额</h1>
        <p class="subtle">固定读取 <code>/codex/settings/usage</code> 页面。</p>
      </section>

      <section class="limit-card">
        <div class="limit-head">
          <span>5 小时使用限额</span>
          <strong id="shortRemaining">--</strong>
        </div>
        <p id="shortReset" class="meta">重置时间：--</p>
      </section>

      <section class="limit-card">
        <div class="limit-head">
          <span>每周使用限额</span>
          <strong id="weeklyRemaining">--</strong>
        </div>
        <p id="weeklyReset" class="meta">重置时间：--</p>
      </section>

      <section class="panel">
        <p id="status" class="status">准备读取余额…</p>
        <button id="refresh" class="refresh" type="button">重新读取</button>
      </section>

      <section class="panel">
        <h2>抓取线索</h2>
        <ul id="hints" class="list"></ul>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
